# ===============================
# CONFIGURAZIONE PRINCIPALE DEL SITO
# ===============================
site_name: "Francesco Mignogna - MDEF & Fab Lab Barcelona"
site_description: "Master in Design for Emergent Futures"
site_author: "Francesco Mignogna"
copyright: "Copyleft 2026 Francesco Mignogna"
repo_name: "mig-sketch / lavezzi-mdef"
site_url: "https://mig-sketch.github.io/lavezzi-mdef/"
repo_url: "https://github.com/mig-sketch/lavezzi-mdef"

# ===============================
# NAVIGAZIONE
# ===============================
nav:
  - Home: index.md
  - About: about/me.md

  - Term 1:
      - Design Studio 01: term1/01-Design studio 01.md
      - Narratives - Digital Gardening: term1/Narratives - Digital Gardening.md
      - Fundamental for Future Makers: term1/Fundamental for Future Makers.md
      - Living with your own ideas: term1/Reflections 1 - Living with your own ideas.md
      - Unpacking tech systems & the machine paradox: term1/unpacking tech systems & the machine paradox.md
      - Atlas of Weak Signal: term1/Atlas of Weak Signal.md

  - Term 2:
      - Extended Intelligences: term2/Extended Intelligences.md
      - Cognitive Orgies: term2/Cognitive Orgies.md
      - Narratives: term2/Narratives.md
      - Situated Design Practices: term2/Situated Design Practices.md
      - Cognitive Orgies II: term2/Cognitive Orgies II.md

  - Term 3:
      - Cognitive Orgies III: term3/Cognitive Orgies III.md

# ===============================
# EXTRA
# ===============================
extra:
  homepage: "https://mig-sketch.github.io/lavezzi-mdef/"
  social:
    - icon: fontawesome/brands/instagram
      link: "https://instagram.com/"
    - icon: fontawesome/brands/linkedin
      link: "https://www.linkedin.com/in/"
    - icon: fontawesome/brands/github
      link: "https://github.com/mig-sketch"

# ===============================
# TEMA
# ===============================
theme:
  name: material
  logo: "assets/docs/images/images.jpg"
  favicon: "images/favicon.svg"

  palette:
    - scheme: default
      primary: white
      accent: red

  font:
    text: "Be Vietnam"
    code: "Cutive Mono"

  features:
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking

# ===============================
# PLUGIN
# ===============================
plugins:
  - search
  - git-revision-date-localized:
      fallback_to_build_date: true

# ===============================
# ESTENSIONI MARKDOWN
# ===============================
markdown_extensions:
  - extra
  - smarty
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - md_in_html
  - footnotes
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: "docs"
  - pymdownx.tilde
  - attr_list
  - pymdownx.tabbed

# ===============================
# CSS EXTRA
# ===============================
extra_css:
  - "stylesheets/extra.css"
